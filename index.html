<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta de Tragos - SNACK Ristrel</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Carta de Tragos</h1>
        <a href="https://snackbowling.netlify.app/">
            <img src="https://snackbowling.netlify.app/images/logo2.svg" class="logo-img" alt="SNACK">
        </a>
    </header>

    <div class="controls-wrapper">
        <input type="text" id="itemSearch" placeholder="Busca tu trago o ingrediente...">
        <div class="filter-pills">
            <div class="pill active" data-filter="all">Todos</div>
            <div class="pill" data-filter="cerveza">Cervezas</div>
            <div class="pill" data-filter="gin">Gin</div>
            <div class="pill" data-filter="vodka">Vodka</div>
            <div class="pill" data-filter="ron">Ron</div>
            <div class="pill" data-filter="aperitivo">Aperitivos</div>
            <div class="pill" data-filter="frutal">Frutales</div>
        </div>
    </div>

    <div id="noResults">No hay coincidencias para tu búsqueda.</div>
    <div id="loadingState">Cargando carta...</div>
    <div id="menuContainer"></div>

    <div class="cta-container">
        <a href="https://menu.maxirest.com/408" class="btn-full-menu">Ver Menú de Comidas y Postres</a>
    </div>

    <footer>DISFRUTÁ CON MODERACIÓN • SNACK RISTREL</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
